name: Bug Report
description: Report a bug or unexpected behavior in riplex
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! If you used the GUI, the debug folder path was
        copied to your clipboard when you clicked "Report a Bug".

  - type: input
    id: version
    attributes:
      label: riplex version
      placeholder: "e.g. 0.1.1.dev18"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "e.g. Windows-11-10.0.26100-SP0"
    validations:
      required: true

  - type: dropdown
    id: frontend
    attributes:
      label: Frontend
      options:
        - CLI
        - GUI
    validations:
      required: true

  - type: input
    id: disc-name
    attributes:
      label: Disc name / volume label
      placeholder: "e.g. STARSHIP_TROOPERS_ANNIV_ED"

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what went wrong or what you expected to happen differently.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: textarea
    id: debug-files
    attributes:
      label: Debug files
      description: |
        Zip the `_riplex/` debug folder from your output directory and drag it
        here. This folder contains snapshot files and a debug log that help
        developers reproduce the issue.

        The folder is typically at:
        `<output_root>/<Title (Year)>/_riplex/`
