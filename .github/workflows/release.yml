name: Build Executables

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[gui]"
          # Keep flet-desktop in lockstep with the flet pin in pyproject
          # (==0.85.1).  The 0.85.3 macOS runtime ships a malformed
          # objective_c.framework that breaks codesign (see issue #21).
          pip install "flet-desktop==0.85.1" pyinstaller

      - name: Cache Flet desktop runtime
        run: |
          python -c "import flet_desktop; flet_desktop.ensure_client_cached()"

      - name: Build CLI executable
        run: |
          pyinstaller --name riplex --onefile --console ^
            --hidden-import riplex_cli.commands.orchestrate ^
            --hidden-import riplex_cli.commands.rip ^
            --hidden-import riplex_cli.commands.organize ^
            --hidden-import riplex_cli.commands.lookup ^
            --hidden-import riplex_cli.commands.setup ^
            --hidden-import certifi ^
            --collect-data certifi ^
            --collect-data dvdcompare_scraper ^
            src/riplex_cli/main.py
        shell: cmd

      - name: Build GUI executable
        run: |
          for /f "delims=" %%i in ('python -c "import flet_desktop; print(flet_desktop.ensure_client_cached())"') do set FLET_CLIENT_CACHE=%%i
          pyinstaller --name riplex-ui --onefile --windowed ^
            --hidden-import riplex_app.screens.welcome ^
            --hidden-import riplex_app.screens.disc_detection ^
            --hidden-import riplex_app.screens.metadata ^
            --hidden-import riplex_app.screens.release ^
            --hidden-import riplex_app.screens.selection ^
            --hidden-import riplex_app.screens.progress ^
            --hidden-import riplex_app.screens.done ^
            --hidden-import riplex_app.screens.folder_picker ^
            --hidden-import riplex_app.screens.organize_preview ^
            --hidden-import riplex_app.screens.organize_done ^
            --hidden-import riplex_app.screens.orchestrate_done ^
            --hidden-import riplex_app.screens.disc_overview ^
            --hidden-import riplex_app.screens.disc_swap ^
            --hidden-import riplex_app.screens.update ^
            --hidden-import certifi ^
            --collect-all flet ^
            --collect-all flet_desktop ^
            --collect-data certifi ^
            --collect-data dvdcompare_scraper ^
            --add-data "%FLET_CLIENT_CACHE%\flet;flet_client" ^
            src/riplex_app/main.py
        shell: cmd

      - name: Package Windows artifacts
        run: |
          mkdir release
          copy dist\riplex.exe release\
          copy dist\riplex-ui.exe release\
        shell: cmd

      - uses: actions/upload-artifact@v4
        with:
          name: riplex-windows
          path: release/

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[gui]"
          # Keep flet-desktop in lockstep with the flet pin in pyproject
          # (==0.85.1).  The 0.85.3 macOS runtime ships a malformed
          # objective_c.framework that breaks codesign (see issue #21).
          pip install "flet-desktop==0.85.1" pyinstaller

      - name: Cache and repair Flet desktop runtime
        run: |
          set -e
          python -c 'import flet_desktop; flet_desktop.ensure_client_cached()' >/dev/null
          FLET_CLIENT_CACHE="$(python -c 'import flet_desktop; print(flet_desktop.ensure_client_cached())' | tail -n 1)"
          echo "FLET_CLIENT_CACHE=$FLET_CLIENT_CACHE" >> "$GITHUB_ENV"
          FLET_APP="$FLET_CLIENT_CACHE/Flet.app"
          echo "Repairing framework bundles under: $FLET_APP"
          # The cached Flet desktop runtime ships .framework bundles whose
          # Versions/Current (and top-level) symlinks are missing/broken.
          # Newer macOS codesign rejects such bundles ("bundle format
          # unrecognized, invalid, or unsuitable"), which makes PyInstaller's
          # forced ad-hoc signing on arm64 fail at the COLLECT stage (the
          # objective_c.framework subcomponent).  Recreate the required
          # framework symlinks before the build so codesign accepts them.
          # This mirrors Flet's own "clean up loose frameworks" fix that
          # lives in `flet pack`/`flet build` but not in raw PyInstaller use.
          repair_fw() {
            fw="$1"
            name="$(basename "$fw" .framework)"
            vers="$fw/Versions"
            [ -d "$vers" ] || return 0
            verdir="$(ls -1 "$vers" | grep -v '^Current$' | head -n1)"
            [ -n "$verdir" ] || return 0
            ( cd "$vers" && ln -sfh "$verdir" Current )
            [ -e "$vers/Current/$name" ] && ( cd "$fw" && ln -sfh "Versions/Current/$name" "$name" )
            [ -e "$vers/Current/Resources" ] && ( cd "$fw" && ln -sfh "Versions/Current/Resources" Resources )
            return 0
          }
          while IFS= read -r fw; do repair_fw "$fw"; done < <(find "$FLET_APP" -name '*.framework' -type d)
          # Clear extended attributes and junk files that also upset codesign.
          xattr -cr "$FLET_APP" || true
          find "$FLET_APP" -name '.DS_Store' -delete || true
          # Re-sign each repaired framework ad-hoc so the structure is proven
          # valid before PyInstaller collects and re-signs it.
          find "$FLET_APP" -name '*.framework' -type d -exec codesign --force --sign - {} + || true

      - name: Build CLI executable
        run: |
          pyinstaller --name riplex --onefile --console \
            --hidden-import riplex_cli.commands.orchestrate \
            --hidden-import riplex_cli.commands.rip \
            --hidden-import riplex_cli.commands.organize \
            --hidden-import riplex_cli.commands.lookup \
            --hidden-import riplex_cli.commands.setup \
            --hidden-import certifi \
            --collect-data certifi \
            --collect-data dvdcompare_scraper \
            src/riplex_cli/main.py

      - name: Build GUI app bundle
        run: |
          FLET_CLIENT_CACHE="$(python -c 'import flet_desktop; print(flet_desktop.ensure_client_cached())')"
          pyinstaller --name riplex-ui --onedir --windowed \
            --hidden-import riplex_app.screens.welcome \
            --hidden-import riplex_app.screens.disc_detection \
            --hidden-import riplex_app.screens.metadata \
            --hidden-import riplex_app.screens.release \
            --hidden-import riplex_app.screens.selection \
            --hidden-import riplex_app.screens.progress \
            --hidden-import riplex_app.screens.done \
            --hidden-import riplex_app.screens.folder_picker \
            --hidden-import riplex_app.screens.organize_preview \
            --hidden-import riplex_app.screens.organize_done \
            --hidden-import riplex_app.screens.orchestrate_done \
            --hidden-import riplex_app.screens.disc_overview \
            --hidden-import riplex_app.screens.disc_swap \
            --hidden-import riplex_app.screens.update \
            --hidden-import certifi \
            --collect-all flet \
            --collect-all flet_desktop \
            --collect-data certifi \
            --collect-data dvdcompare_scraper \
            --add-data "$FLET_CLIENT_CACHE:flet_client" \
            src/riplex_app/main.py

      - name: Package macOS artifacts
        run: |
          mkdir -p release
          cp dist/riplex release/riplex-macos
          # -y preserves symlinks (including the .framework Versions/Current
          # links). Without it, zip flattens those symlinks into duplicate
          # files and the unpacked .app crashes on launch (issue #21).
          cd dist && zip -r -y ../release/riplex-ui-macos.zip riplex-ui.app

      - uses: actions/upload-artifact@v4
        with:
          name: riplex-macos
          path: release/

  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract tag annotation
        id: tag_notes
        run: |
          BODY=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")
          echo "body<<ENDOFNOTES" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "ENDOFNOTES" >> "$GITHUB_OUTPUT"

      - name: Prepare release files
        run: |
          mkdir release
          cp artifacts/riplex-windows/riplex.exe release/riplex-windows.exe
          cp artifacts/riplex-windows/riplex-ui.exe release/riplex-ui-windows.exe
          cp artifacts/riplex-macos/riplex-macos release/
          cp artifacts/riplex-macos/riplex-ui-macos.zip release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Auto-generate notes from commits and PRs since the previous tag,
          # then prepend the tag annotation (if any) as a header. Using just
          # the tag annotation produces single-line releases when the tag
          # was created with `git tag -a -m "<subject>"` and no body.
          generate_release_notes: true
          body: ${{ steps.tag_notes.outputs.body }}
          files: |
            release/riplex-windows.exe
            release/riplex-ui-windows.exe
            release/riplex-macos
            release/riplex-ui-macos.zip
